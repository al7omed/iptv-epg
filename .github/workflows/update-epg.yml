name: Update EPG

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/build_epg.py'
      - '.github/workflows/update-epg.yml'

permissions:
  contents: write

concurrency:
  group: update-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      M3U_URL: ${{ secrets.M3U_URL }}
      PROVIDER_EPG_URL: ${{ secrets.PROVIDER_EPG_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build EPG
        run: python3 scripts/build_epg.py

      - name: Stats
        run: |
          echo "guide.xml:    $(stat -c '%s' docs/guide.xml) bytes"
          echo "guide.xml.gz: $(stat -c '%s' docs/guide.xml.gz) bytes"
          echo "channels:     $(grep -c '<channel ' docs/guide.xml)"
          echo "programmes:   $(grep -c '<programme ' docs/guide.xml)"

      - name: Ensure playlist.m3u stays purged
        run: |
          # Safety: if a stale playlist.m3u somehow appears in the working tree,
          # remove it before committing. We do not publish the M3U publicly.
          rm -f docs/playlist.m3u
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml docs/guide.xml.gz docs/tvg-id-map.tsv
          # Also stage deletion if playlist.m3u happens to be tracked.
          git rm --cached --ignore-unmatch docs/playlist.m3u >/dev/null 2>&1 || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG + map $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
